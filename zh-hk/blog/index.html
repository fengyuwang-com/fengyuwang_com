        <div class="container">
            
<style>
.blog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
}
.blog-card {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 4px 16px rgba(15,23,42,.06);
    border: 1px solid rgba(15,23,42,.06);
    display: flex;
    flex-direction: column;
    transition: transform .2s ease, box-shadow .2s ease;
}
.blog-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(15,23,42,.1);
}
.blog-card h3 {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 0 0 10px;
    color: #111827;
    line-height: 1.4;
}
.blog-card p {
    font-size: .92rem;
    color: #6b7280;
    line-height: 1.6;
    margin: 0 0 14px;
    flex-grow: 1;
}
.blog-card .blog-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
}
.blog-card .blog-meta span {
    display: inline-flex;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0,113,227,.08);
    color: #0071e3;
    font-size: .78rem;
    font-weight: 600;
}
.blog-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #0071e3;
    font-weight: 600;
    font-size: .9rem;
    text-decoration: none;
    margin-top: auto;
}
.blog-link:hover { color: #005bb5; }
.blog-link::after { content: "→"; transition: transform .2s ease; }
.blog-link:hover::after { transform: translateX(3px); }
body[data-theme="dark"] .blog-card { background: #1e293b; border-color: rgba(148,163,184,.12); }
body[data-theme="dark"] .blog-card h3 { color: #e5ecf4; }
body[data-theme="dark"] .blog-card p { color: #9fb0c3; }
.search-shell { margin-bottom: 28px; }
.search-input {
    width: 100%;
    max-width: 480px;
    padding: 12px 18px;
    border: 1px solid rgba(15,23,42,.12);
    border-radius: 999px;
    font-size: .95rem;
    outline: 0;
    background: #fff;
    color: #111827;
    transition: border-color .2s ease, box-shadow .2s ease;
}
.search-input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.12); }
body[data-theme="dark"] .search-input { background: #1e293b; border-color: rgba(148,163,184,.2); color: #e5ecf4; }
body[data-theme="dark"] .search-input:focus { border-color: #2997ff; box-shadow: 0 0 0 3px rgba(41,151,255,.15); }
.search-count { font-size: .85rem; color: #9ca3af; margin-top: 8px; }
.pagination-shell {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    margin: 32px 0;
}
.pagination-shell a,
.pagination-shell span.page-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    height: 36px;
    padding: 0 10px;
    border-radius: 10px;
    font-size: .88rem;
    font-weight: 600;
    text-decoration: none;
    color: #374151;
    background: transparent;
    border: 1px solid transparent;
    transition: background .15s ease, border-color .15s ease;
}
.pagination-shell a:hover { background: rgba(0,113,227,.08); border-color: rgba(0,113,227,.2); }
.pagination-shell .page-btn.active { background: #0071e3; color: #fff; border-color: #0071e3; }
.pagination-shell .page-btn.dots { border: 0; color: #9ca3af; }
.pagination-shell .go-to-shell { display: inline-flex; align-items: center; gap: 4px; margin-left: 8px; }
.pagination-shell .go-to-input {
    width: 48px; height: 32px; text-align: center;
    border: 1px solid rgba(15,23,42,.12); border-radius: 8px;
    font-size: .85rem; outline: 0; background: #fff; color: #111827;
}
.pagination-shell .go-to-input:focus { border-color: #0071e3; box-shadow: 0 0 0 2px rgba(0,113,227,.12); }
.pagination-shell .go-to-btn {
    display: inline-flex; align-items: center; justify-content: center;
    height: 32px; padding: 0 12px; border: 0; border-radius: 8px;
    background: #0071e3; color: #fff; font-size: .82rem; font-weight: 600; cursor: pointer;
}
.pagination-shell .go-to-btn:hover { background: #005bb5; }
body[data-theme="dark"] .pagination-shell a { color: #d1d5db; }
body[data-theme="dark"] .pagination-shell .page-btn.active { background: #2997ff; color: #fff; }
body[data-theme="dark"] .pagination-shell .go-to-input { background: #1e293b; border-color: rgba(148,163,184,.2); color: #e5ecf4; }
body[data-theme="dark"] .pagination-shell .go-to-btn { background: #2997ff; }
body[data-theme="dark"] .pagination-shell .go-to-btn:hover { background: #60a5fa; }
@media (max-width: 767px) {
    .blog-grid { grid-template-columns: 1fr; }
    .pagination-shell a, .pagination-shell span.page-btn { min-width: 32px; height: 32px; font-size: .82rem; }
}
</style>

<div class="page-header">
    <h1>博客</h1>
    <p>原創文章、結構筆記與研究導向的思考</p>
</div>

<div class="search-shell">
    <input class="search-input" type="text" id="blogSearch" placeholder="搜索文章..." autocomplete="off">
    <div class="search-count" id="searchCount"></div>
</div>

<div class="blog-grid" id="blogGrid">

</div>




<script>
(function() {
    var si = document.getElementById("blogSearch");
    var grid = document.getElementById("blogGrid");
    var ce = document.getElementById("searchCount");
    if (!si || !grid) return;
    var cards = Array.from(grid.querySelectorAll(".blog-card"));
    var total = cards.length;
    si.addEventListener("input", function() {
        var q = this.value.toLowerCase().trim();
        var v = 0;
        cards.forEach(function(c) {
            var t = (c.getAttribute("data-title")||"").toLowerCase();
            var s = (c.getAttribute("data-summary")||"").toLowerCase();
            var tg = (c.getAttribute("data-tags")||"").toLowerCase();
            var m = !q || t.indexOf(q) !== -1 || s.indexOf(q) !== -1 || tg.indexOf(q) !== -1;
            c.style.display = m ? "" : "none";
            if (m) v++;
        });
        if (ce) ce.textContent = q ? v + " / " + total + " 篇" : "";
    });
    var gb = document.getElementById("goToBtn");
    var gi = document.getElementById("goToPage");
    if (gb && gi) {
        function gp() {
            var p = parseInt(gi.value, 10);
            if (p >= 1 && p <=  0 ) {
                window.location.href = "\/zh-hk\/blog\/".replace("/page/1/", "/page/" + p + "/");
            }
        }
        gb.addEventListener("click", gp);
        gi.addEventListener("keydown", function(e) { if (e.key === "Enter") gp(); });
    }
})();
</script>
