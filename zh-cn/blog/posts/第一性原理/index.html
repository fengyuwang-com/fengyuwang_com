    <h1>第一性原理</h1>
    <div class="article-meta">
        <span class="article-date">2026-05-09</span>
        <span class="meta-sep">·</span>
        <span style="display:inline-flex;padding:4px 10px;border-radius:999px;background:rgba(0,113,227,.08);color:#0071e3;font-size:.8rem;font-weight:600;">商业</span><span style="display:inline-flex;padding:4px 10px;border-radius:999px;background:rgba(0,113,227,.08);color:#0071e3;font-size:.8rem;font-weight:600;">哲学</span><span style="display:inline-flex;padding:4px 10px;border-radius:999px;background:rgba(0,113,227,.08);color:#0071e3;font-size:.8rem;font-weight:600;">自我</span>
    </div>
    <div class="article-content"><p>赚钱的第一性原理是创造价值，不是出卖时间。 创造价值的第一性原理是解决问题，不是提供劳动。 解决问题的第一性原理是识别真需求，不是自我感动。 识别真需求的第一性原理是实践反馈，不是闭门造车。 实践反馈的第一性原理是快速迭代，不是仔细打磨。 快速迭代的第一性原理是验证模型，不是为了交付。 验证模型的第一性原理是为了系统复制，而不是个人苦干。 系统复制的第一性原理是杠杆思维，不是线性积累。</p>
