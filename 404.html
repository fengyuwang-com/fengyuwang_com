<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Redirecting | Fengyu WANG</title>
  <meta name="robots" content="noindex,follow">
  <link rel="icon" type="image/png" href="assets/img/logo.png">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 52%, #e0f2fe 100%);
      color: #0f172a;
    }
    .card {
      width: min(680px, 100%);
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(15,23,42,.12);
      padding: 32px;
    }
    h1 { margin: 0 0 10px; font-size: 30px; }
    p { margin: 0 0 16px; color: #475569; line-height: 1.7; }
    .links { display: grid; gap: 12px; }
    .links a {
      display: block;
      padding: 14px 16px;
      border-radius: 14px;
      background: #0f172a;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecting</h1>
    <p>This URL is being resolved to the best language match for this site.</p>
    <div class="links">
      <a href="/en/index.html">English</a>
      <a href="/zh-cn/index.html">&#31616;&#20307;&#20013;&#25991;</a>
      <a href="/zh-hk/index.html">&#32321;&#39636;&#20013;&#25991;</a>
    </div>
  </div>
  <script>
    (function () {
      var routes = {"en":["about.html","capabilities.html","cases.html","contact.html","index.html","invest.html","mkt.html","portfolio.html","services.html"],"zh-cn":["about.html","capabilities.html","cases.html","contact.html","index.html","invest.html","mkt.html","portfolio.html","services.html"],"zh-hk":["about.html","capabilities.html","cases.html","contact.html","index.html","invest.html","mkt.html","portfolio.html","services.html"]};
      var lang = (navigator.language || '').toLowerCase();
      var preferred = 'en';
      if (lang.indexOf('zh-hk') === 0 || lang.indexOf('zh-tw') === 0 || lang.indexOf('zh-hant') === 0) {
        preferred = 'zh-hk';
      } else if (lang.indexOf('zh') === 0) {
        preferred = 'zh-cn';
      }

      function resolveTarget(pathname) {
        var clean = pathname.replace(/^\/+|\/+$/g, '');
        if (!clean || clean === '404.html') return '/' + preferred + '/index.html';
        if (clean.startsWith('en/') || clean.startsWith('zh-cn/') || clean.startsWith('zh-hk/')) return '/' + clean;

        var candidates = [];
        if (clean.endsWith('.html')) {
          candidates.push(clean);
        } else {
          candidates.push(clean + '.html');
          candidates.push(clean + '/index.html');
        }

        for (var i = 0; i < candidates.length; i++) {
          if (routes[preferred].indexOf(candidates[i]) !== -1) {
            return '/' + preferred + '/' + candidates[i];
          }
        }
        return '/' + preferred + '/index.html';
      }

      window.location.replace(resolveTarget(window.location.pathname));
    })();
  </script>
</body>
</html>
