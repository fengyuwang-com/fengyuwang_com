<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>Marketing | Fengyu WANG</title>
    <meta name="robots" content="noindex,follow">
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 52%, #e0f2fe 100%);
            color: #0f172a;
        }
        .card {
            width: min(640px, 100%);
            background: rgba(255,255,255,.92);
            border: 1px solid rgba(15,23,42,.08);
            border-radius: 24px;
            box-shadow: 0 24px 64px rgba(15,23,42,.12);
            padding: 32px;
        }
        h1 { margin: 0 0 10px; font-size: 32px; }
        p { margin: 0 0 18px; color: #475569; line-height: 1.7; }
        .links { display: grid; gap: 12px; }
        .links a {
            display: block;
            padding: 14px 16px;
            border-radius: 14px;
            background: #0f172a;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Marketing</h1>
        <p>Redirecting to the best language match for this page.</p>
        <div class="links">
            <a href="en/mkt.html">English</a>
            <a href="zh-cn/mkt.html">&#31616;&#20307;&#20013;&#25991;</a>
            <a href="zh-hk/mkt.html">&#32321;&#39636;&#20013;&#25991;</a>
        </div>
    </div>
    <script>
        (function () {
            var lang = (navigator.language || '').toLowerCase();
            var target = 'en/mkt.html';
            if (lang.indexOf('zh-hk') === 0 || lang.indexOf('zh-tw') === 0 || lang.indexOf('zh-hant') === 0) {
                target = 'zh-hk/mkt.html';
            } else if (lang.indexOf('zh') === 0) {
                target = 'zh-cn/mkt.html';
            }
            window.location.replace(target);
        })();
    </script>
</body>
</html>
