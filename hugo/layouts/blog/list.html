{{ define "main" }}{{ $lang := .Site.Language.Lang }}
<style>
.blog-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:20px; margin-bottom:32px; }
.blog-card { background:#fff; border-radius:20px; padding:24px; box-shadow:0 4px 16px rgba(15,23,42,.06); border:1px solid rgba(15,23,42,.06); display:flex; flex-direction:column; transition:transform .2s ease,box-shadow .2s ease; cursor:pointer; text-decoration:none; color:inherit; }
.blog-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(15,23,42,.1); }
.blog-card h3 { font-size:1.15rem; font-weight:700; margin:0 0 10px; color:#111827; line-height:1.4; }
.blog-card .summary-text { font-size:.92rem; color:#6b7280; line-height:1.6; margin:0; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.blog-card .summary-divider { border:0; border-top:1px solid rgba(15,23,42,.08); margin:14px 0; }
body[data-theme="dark"] .blog-card { background:#1e293b; border-color:rgba(148,163,184,.12); }
body[data-theme="dark"] .blog-card h3 { color:#e5ecf4; }
body[data-theme="dark"] .blog-card .summary-text { color:#9fb0c3; }
.search-shell { margin-bottom:28px; text-align:center; }
.search-input { width:100%; max-width:480px; padding:12px 18px; border:1px solid rgba(15,23,42,.12); border-radius:999px; font-size:.95rem; outline:0; background:#fff; color:#111827; }
.search-input:focus { border-color:#0071e3; box-shadow:0 0 0 3px rgba(0,113,227,.12); }
body[data-theme="dark"] .search-input { background:#1e293b; border-color:rgba(148,163,184,.2); color:#e5ecf4; }
.pagination-shell { display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; margin:32px 0; }
.pagination-shell a,.pagination-shell span.page-btn { display:inline-flex; align-items:center; justify-content:center; min-width:36px; height:36px; padding:0 10px; border-radius:10px; font-size:.88rem; font-weight:600; text-decoration:none; color:#374151; background:transparent; border:1px solid transparent; }
.pagination-shell a:hover { background:rgba(0,113,227,.08); border-color:rgba(0,113,227,.2); }
.pagination-shell .page-btn.active { background:#0071e3; color:#fff; border-color:#0071e3; }
.pagination-shell .go-to-shell { display:inline-flex; align-items:center; gap:4px; margin-left:8px; }
.pagination-shell .go-to-input { width:48px; height:32px; text-align:center; border:1px solid rgba(15,23,42,.12); border-radius:8px; font-size:.85rem; outline:0; background:#fff; color:#111827; }
.pagination-shell .go-to-btn { height:32px; padding:0 12px; border:0; border-radius:8px; background:#0071e3; color:#fff; font-size:.82rem; font-weight:600; cursor:pointer; }
.sort-shell { text-align:center; margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; }
.sort-shell label { font-size:.85rem; color:#6b7280; font-weight:600; }
.sort-shell select { padding:8px 14px; border:1px solid rgba(15,23,42,.12); border-radius:8px; font-size:.85rem; outline:0; background:#fff; color:#111827; cursor:pointer; }
.sort-shell select:focus { border-color:#0071e3; }
body[data-theme="dark"] .sort-shell select { background:#1e293b; border-color:rgba(148,163,184,.2); color:#e5ecf4; }
body[data-theme="dark"] .sort-shell label { color:#9fb0c3; }
.tag-cloud { text-align:center; margin-bottom:24px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.tag-cloud span { display:inline-flex; padding:4px 12px; border-radius:999px; background:rgba(0,113,227,.06); color:#0071e3; font-size:.8rem; font-weight:600; cursor:pointer; }
.tag-cloud span:hover { background:rgba(0,113,227,.12); }
.tag-cloud span.active { background:#0071e3; color:#fff; }
.blog-card .blog-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.blog-card .blog-tags span { display:inline-flex; padding:2px 8px; border-radius:999px; background:rgba(0,113,227,.06); color:#0071e3; font-size:.72rem; font-weight:600; }
